<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>阅读 - 中英阅读助手</title>
<meta name="theme-color" content="#2b2015" />
<link rel="stylesheet" href="reader.css" />
</head>
<body>
  <div class="readerApp">
    <div class="readerTopBar">
      <button class="backBtn" id="backBtn" title="返回书架">←</button>
      <div class="readerTitle" id="readerTitle">加载中…</div>
      <button class="collapseBtn" id="collapseBtn" title="收起工具栏">收起 ⌃</button>
      <button class="modeToggleBtn" id="modeToggleBtn" style="display:none" title="切换排版模式">Aa 重排</button>
      <button class="layoutToggleBtn" id="layoutToggleBtn" title="单页/双页">▯ 单页</button>
      <div class="fontSizeCtl">
        <button id="fontSizeDown" title="缩小字体">A-</button>
        <button id="fontSizeUp" title="放大字体">A+</button>
      </div>
      <div class="readerProgress" id="readerProgress"></div>
    </div>
    <div class="expandHandle" id="expandHandle" title="展开工具栏">⌄</div>

    <div class="readerStage" id="readerStage">
      <div class="readerLoading" id="readerLoading">
        <div class="bookLoader" aria-hidden="true">
          <div class="bookLoaderSpine"></div>
          <div class="bookLoaderPage left"></div>
          <div class="bookLoaderPage right"></div>
        </div>
        <div id="readerLoadingText"></div>
      </div>
      <div id="flipbook" style="display:none"></div>
      <div class="readerNav prev" id="navPrev">‹</div>
      <div class="readerNav next" id="navNext">›</div>
    </div>

    <div class="readerBottomBar" id="readerBottomBar" style="display:none">
      <button id="btnPrev" title="上一页">‹</button>
      <div class="pageIndicator">
        <input type="number" id="readerPageInput" min="1" title="输入页码跳转" /><span id="readerPageTotal"></span>
      </div>
      <button id="btnNext" title="下一页">›</button>
    </div>

    <button class="sidePanelTab" id="sidePanelTab" title="章节 / 跳转页码">☰</button>
    <div class="sidePanelScrim" id="sidePanelScrim"></div>
    <div class="sidePanel" id="sidePanel">
      <div class="sidePanelHeader">
        <span>章节</span>
        <button id="sidePanelClose" title="收起">✕</button>
      </div>
      <div class="sidePanelJump">
        <input type="range" id="pageSlider" min="0" max="0" value="0" />
      </div>
      <div class="chapterList" id="chapterList"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/epubjs@0.3.93/dist/epub.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.js"></script>
  <script src="supabase-web-client.js"></script>
  <script src="book-store.js"></script>
  <script src="word-popup.js"></script>
  <script src="word-interact.js"></script>
  <script src="pdf-reader.js"></script>
  <script src="reflow-reader.js"></script>
  <script src="epub-reader.js"></script>
  <script src="reader.js"></script>
</body>
</html>
